<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 660" width="1000" height="660">
  <!-- Background -->
  <rect width="1000" height="660" fill="#0f172a"/>

  <!-- Title -->
  <text x="500" y="32" text-anchor="middle" fill="#f1f5f9" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700">ClinAgent — Security Handshake: Demo vs Production</text>

  <!-- LEFT column header box -->
  <rect x="20" y="45" width="470" height="40" fill="#1e2a1a" stroke="#4ade80" stroke-width="1.5" rx="8"/>
  <text x="255" y="64" text-anchor="middle" fill="#86efac" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700">🧪 DEMO / SANDBOX</text>
  <text x="255" y="78" text-anchor="middle" fill="#64748b" font-family="Segoe UI, Arial, sans-serif" font-size="9">sandbox.cds-hooks.org + localhost</text>

  <!-- RIGHT column header box -->
  <rect x="510" y="45" width="470" height="40" fill="#1e1b4b" stroke="#818cf8" stroke-width="1.5" rx="8"/>
  <text x="745" y="64" text-anchor="middle" fill="#a5b4fc" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700">🏥 PRODUCTION (Real EHR)</text>
  <text x="745" y="78" text-anchor="middle" fill="#64748b" font-family="Segoe UI, Arial, sans-serif" font-size="9">Epic / Cerner / Medblocks</text>

  <!-- Center divider -->
  <line x1="500" y1="50" x2="500" y2="650" stroke="#1e293b" stroke-width="1.5"/>

  <!-- ======= ROW 1 ======= -->
  <!-- Scenario label -->
  <text x="500" y="100" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI, Arial, sans-serif" font-size="8" font-weight="700" letter-spacing="1">1. CDS HOOK REQUEST AUTHENTICATION</text>

  <!-- LEFT box -->
  <rect x="25" y="105" width="460" height="78" fill="#0f1a0f" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="6,3" rx="6"/>
  <text x="35" y="120" fill="#86efac" font-family="'Courier New', monospace" font-size="8.5">POST /cds-services/clinagent-sepsis</text>
  <text x="35" y="134" fill="#64748b" font-family="'Courier New', monospace" font-size="8.5">No Authorization header</text>
  <text x="35" y="148" fill="#94a3b8" font-family="Segoe UI, Arial, sans-serif" font-size="9">SANDBOX_MODE=true → JWT validation SKIPPED</text>
  <rect x="35" y="155" width="110" height="20" fill="#052e16" stroke="#22c55e" stroke-width="1" rx="4"/>
  <text x="90" y="169" text-anchor="middle" fill="#4ade80" font-family="Segoe UI, Arial, sans-serif" font-size="9" font-weight="700">✓ OK for demo</text>

  <!-- RIGHT box -->
  <rect x="515" y="105" width="460" height="78" fill="#1e1b4b" stroke="#818cf8" stroke-width="1.5" rx="6"/>
  <text x="525" y="120" fill="#c7d2fe" font-family="'Courier New', monospace" font-size="8.5">POST /cds-services/clinagent-sepsis</text>
  <text x="525" y="134" fill="#a5b4fc" font-family="'Courier New', monospace" font-size="8.5">Authorization: Bearer eyJhbGciOiJSUzI1...</text>
  <text x="525" y="148" fill="#94a3b8" font-family="Segoe UI, Arial, sans-serif" font-size="9">Service MUST verify: iss · aud · exp · scope</text>
  <rect x="525" y="155" width="120" height="20" fill="#1e1b4b" stroke="#818cf8" stroke-width="1" rx="4"/>
  <text x="585" y="169" text-anchor="middle" fill="#a5b4fc" font-family="Segoe UI, Arial, sans-serif" font-size="9" font-weight="700">🔐 JWT Required</text>

  <!-- Row separator -->
  <line x1="10" y1="190" x2="990" y2="190" stroke="#1e293b" stroke-width="1"/>

  <!-- ======= ROW 2 ======= -->
  <text x="500" y="200" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI, Arial, sans-serif" font-size="8" font-weight="700" letter-spacing="1">2. CDS HOOKS REQUEST SIGNING (JWK)</text>

  <!-- LEFT box -->
  <rect x="25" y="205" width="460" height="78" fill="#0f1a0f" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="6,3" rx="6"/>
  <text x="35" y="220" fill="#64748b" font-family="'Courier New', monospace" font-size="8.5">No request body signature</text>
  <text x="35" y="234" fill="#94a3b8" font-family="Segoe UI, Arial, sans-serif" font-size="9">Hook payload accepted as-is</text>
  <rect x="35" y="252" width="140" height="20" fill="#052e16" stroke="#22c55e" stroke-width="1" rx="4"/>
  <text x="105" y="266" text-anchor="middle" fill="#4ade80" font-family="Segoe UI, Arial, sans-serif" font-size="9" font-weight="700">✓ Skipped in sandbox</text>

  <!-- RIGHT box -->
  <rect x="515" y="205" width="460" height="78" fill="#1e1b4b" stroke="#818cf8" stroke-width="1.5" rx="6"/>
  <text x="525" y="220" fill="#a5b4fc" font-family="'Courier New', monospace" font-size="8.5">X-Request-Signature: &lt;JWK signed hash&gt;</text>
  <text x="525" y="234" fill="#94a3b8" font-family="Segoe UI, Arial, sans-serif" font-size="9">EHR signs entire request body</text>
  <text x="525" y="248" fill="#94a3b8" font-family="Segoe UI, Arial, sans-serif" font-size="9">Service verifies using EHR's public JWKS URL</text>
  <rect x="525" y="255" width="140" height="20" fill="#1e1b4b" stroke="#818cf8" stroke-width="1" rx="4"/>
  <text x="595" y="269" text-anchor="middle" fill="#a5b4fc" font-family="Segoe UI, Arial, sans-serif" font-size="9" font-weight="700">🔐 Signature Verified</text>

  <!-- Row separator -->
  <line x1="10" y1="288" x2="990" y2="288" stroke="#1e293b" stroke-width="1"/>

  <!-- ======= ROW 3 ======= -->
  <text x="500" y="298" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI, Arial, sans-serif" font-size="8" font-weight="700" letter-spacing="1">3. FHIR SERVER ACCESS</text>

  <!-- LEFT box -->
  <rect x="25" y="303" width="460" height="78" fill="#0f1a0f" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="6,3" rx="6"/>
  <text x="35" y="318" fill="#86efac" font-family="'Courier New', monospace" font-size="8.5">fhirServer: http://localhost:8082/fhir</text>
  <text x="35" y="332" fill="#64748b" font-family="'Courier New', monospace" font-size="8.5">fhirAuthorization: null</text>
  <text x="35" y="346" fill="#94a3b8" font-family="Segoe UI, Arial, sans-serif" font-size="9">Open HAPI FHIR — no auth token needed</text>
  <rect x="35" y="353" width="110" height="20" fill="#052e16" stroke="#22c55e" stroke-width="1" rx="4"/>
  <text x="90" y="367" text-anchor="middle" fill="#4ade80" font-family="Segoe UI, Arial, sans-serif" font-size="9" font-weight="700">✓ Open access</text>

  <!-- RIGHT box -->
  <rect x="515" y="303" width="460" height="78" fill="#1e1b4b" stroke="#818cf8" stroke-width="1.5" rx="6"/>
  <text x="525" y="318" fill="#c7d2fe" font-family="'Courier New', monospace" font-size="8.5">fhirServer: https://fhir.epic.com/api/FHIR/R4</text>
  <text x="525" y="332" fill="#a5b4fc" font-family="'Courier New', monospace" font-size="8.5">fhirAuthorization: &#123; access_token: "eyJ...",</text>
  <text x="535" y="346" fill="#a5b4fc" font-family="'Courier New', monospace" font-size="8.5">scope: "patient/*.read" &#125;</text>
  <rect x="525" y="355" width="130" height="18" fill="#1e1b4b" stroke="#818cf8" stroke-width="1" rx="4"/>
  <text x="590" y="368" text-anchor="middle" fill="#a5b4fc" font-family="Segoe UI, Arial, sans-serif" font-size="9" font-weight="700">🔐 Token Required</text>

  <!-- Row separator -->
  <line x1="10" y1="386" x2="990" y2="386" stroke="#1e293b" stroke-width="1"/>

  <!-- ======= ROW 4 ======= -->
  <text x="500" y="396" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI, Arial, sans-serif" font-size="8" font-weight="700" letter-spacing="1">4. TRANSPORT SECURITY</text>

  <!-- LEFT box -->
  <rect x="25" y="401" width="460" height="78" fill="#0f1a0f" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="6,3" rx="6"/>
  <text x="35" y="416" fill="#86efac" font-family="'Courier New', monospace" font-size="8.5">http://localhost:8001</text>
  <text x="35" y="430" fill="#94a3b8" font-family="Segoe UI, Arial, sans-serif" font-size="9">Plain HTTP — acceptable for local dev only</text>
  <rect x="35" y="449" width="100" height="20" fill="#052e16" stroke="#22c55e" stroke-width="1" rx="4"/>
  <text x="85" y="463" text-anchor="middle" fill="#4ade80" font-family="Segoe UI, Arial, sans-serif" font-size="9" font-weight="700">✓ Local only</text>

  <!-- RIGHT box -->
  <rect x="515" y="401" width="460" height="78" fill="#1e1b4b" stroke="#818cf8" stroke-width="1.5" rx="6"/>
  <text x="525" y="416" fill="#c7d2fe" font-family="'Courier New', monospace" font-size="8.5">https://clinagent-api.onrender.com</text>
  <text x="525" y="430" fill="#94a3b8" font-family="Segoe UI, Arial, sans-serif" font-size="9">TLS 1.2+ mandatory</text>
  <text x="525" y="444" fill="#94a3b8" font-family="Segoe UI, Arial, sans-serif" font-size="9">EHR will refuse plain HTTP endpoints</text>
  <rect x="525" y="451" width="115" height="20" fill="#1e1b4b" stroke="#818cf8" stroke-width="1" rx="4"/>
  <text x="583" y="465" text-anchor="middle" fill="#a5b4fc" font-family="Segoe UI, Arial, sans-serif" font-size="9" font-weight="700">🔐 HTTPS Only</text>

  <!-- Row separator -->
  <line x1="10" y1="484" x2="990" y2="484" stroke="#1e293b" stroke-width="1"/>

  <!-- ======= ROW 5 ======= -->
  <text x="500" y="494" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI, Arial, sans-serif" font-size="8" font-weight="700" letter-spacing="1">5. REACT SMART APP LAUNCH</text>

  <!-- LEFT box -->
  <rect x="25" y="499" width="460" height="78" fill="#0f1a0f" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="6,3" rx="6"/>
  <text x="35" y="514" fill="#86efac" font-family="'Courier New', monospace" font-size="8.5">launch.jsx detects fhirServiceUrl param</text>
  <text x="35" y="528" fill="#94a3b8" font-family="Segoe UI, Arial, sans-serif" font-size="9">Skips OAuth entirely</text>
  <text x="35" y="542" fill="#94a3b8" font-family="Segoe UI, Arial, sans-serif" font-size="9">Fetches FHIR directly (no token)</text>
  <rect x="35" y="549" width="105" height="20" fill="#052e16" stroke="#22c55e" stroke-width="1" rx="4"/>
  <text x="88" y="563" text-anchor="middle" fill="#4ade80" font-family="Segoe UI, Arial, sans-serif" font-size="9" font-weight="700">✓ Direct fetch</text>

  <!-- RIGHT box -->
  <rect x="515" y="499" width="460" height="78" fill="#1e1b4b" stroke="#818cf8" stroke-width="1.5" rx="6"/>
  <text x="525" y="514" fill="#94a3b8" font-family="Segoe UI, Arial, sans-serif" font-size="9">Full SMART on FHIR OAuth2 flow</text>
  <text x="525" y="528" fill="#94a3b8" font-family="Segoe UI, Arial, sans-serif" font-size="9">EHR → Authorization endpoint → token</text>
  <text x="525" y="542" fill="#94a3b8" font-family="Segoe UI, Arial, sans-serif" font-size="9">React app uses access_token for all FHIR calls</text>
  <rect x="525" y="549" width="130" height="20" fill="#1e1b4b" stroke="#818cf8" stroke-width="1" rx="4"/>
  <text x="590" y="563" text-anchor="middle" fill="#a5b4fc" font-family="Segoe UI, Arial, sans-serif" font-size="9" font-weight="700">🔐 OAuth2 Required</text>

  <!-- Row separator -->
  <line x1="10" y1="582" x2="990" y2="582" stroke="#1e293b" stroke-width="1"/>

  <!-- ======= ROW 6 ======= -->
  <text x="500" y="592" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI, Arial, sans-serif" font-size="8" font-weight="700" letter-spacing="1">6. APP REGISTRATION</text>

  <!-- LEFT box -->
  <rect x="25" y="597" width="200" height="52" fill="#0f1a0f" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="6,3" rx="6"/>
  <text x="35" y="612" fill="#64748b" font-family="'Courier New', monospace" font-size="8.5">No registration needed</text>
  <text x="35" y="626" fill="#94a3b8" font-family="Segoe UI, Arial, sans-serif" font-size="9">Any URL can call sandbox</text>
  <rect x="35" y="633" width="110" height="14" fill="#052e16" stroke="#22c55e" stroke-width="1" rx="3"/>
  <text x="90" y="644" text-anchor="middle" fill="#4ade80" font-family="Segoe UI, Arial, sans-serif" font-size="8" font-weight="700">✓ Open sandbox</text>

  <!-- RIGHT box -->
  <rect x="515" y="597" width="200" height="52" fill="#1e1b4b" stroke="#818cf8" stroke-width="1.5" rx="6"/>
  <text x="525" y="612" fill="#94a3b8" font-family="Segoe UI, Arial, sans-serif" font-size="9">Registered with EHR vendor</text>
  <text x="525" y="626" fill="#94a3b8" font-family="Segoe UI, Arial, sans-serif" font-size="9">Client ID + JWKS URL submitted</text>
  <rect x="525" y="633" width="115" height="14" fill="#1e1b4b" stroke="#818cf8" stroke-width="1" rx="3"/>
  <text x="583" y="644" text-anchor="middle" fill="#a5b4fc" font-family="Segoe UI, Arial, sans-serif" font-size="8" font-weight="700">🔐 Pre-registered</text>

  <!-- ======= BOTTOM SUMMARY BAR ======= -->
  <!-- LEFT pill -->
  <rect x="20" y="630" width="460" height="22" fill="#052e16" stroke="#22c55e" stroke-width="1" rx="6"/>
  <text x="250" y="645" text-anchor="middle" fill="#4ade80" font-family="Segoe UI, Arial, sans-serif" font-size="9" font-weight="700">Demo: 0 of 6 security layers active — for local development only</text>

  <!-- RIGHT pill -->
  <rect x="510" y="630" width="470" height="22" fill="#1e1b4b" stroke="#818cf8" stroke-width="1" rx="6"/>
  <text x="745" y="645" text-anchor="middle" fill="#a5b4fc" font-family="Segoe UI, Arial, sans-serif" font-size="9" font-weight="700">Production: All 6 security layers required</text>
</svg>
