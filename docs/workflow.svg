<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 620" width="1100" height="620" font-family="Segoe UI, Arial, sans-serif">

  <defs>
    <!-- Blue arrowhead -->
    <marker id="arrow-blue" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3b82f6"/>
    </marker>
    <!-- Blue dashed arrowhead (return) -->
    <marker id="arrow-blue-dash" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3b82f6"/>
    </marker>
    <!-- Amber arrowhead -->
    <marker id="arrow-amber" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#f59e0b"/>
    </marker>
    <!-- Green arrowhead -->
    <marker id="arrow-green" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#34d399"/>
    </marker>
    <!-- Indigo arrowhead -->
    <marker id="arrow-indigo" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#818cf8"/>
    </marker>
    <!-- Orange arrowhead -->
    <marker id="arrow-orange" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#fb923c"/>
    </marker>
  </defs>

  <!-- ==================== BACKGROUND ==================== -->
  <rect width="1100" height="620" fill="#0f172a"/>

  <!-- ==================== ROW 1: TITLE ==================== -->
  <text x="550" y="34" text-anchor="middle" fill="white" font-size="17" font-weight="bold">ClinAgent — Complete System Workflow</text>

  <!-- ==================== ROW 2: PIPELINE ==================== -->

  <!-- Step 1: EHR / Sandbox — x=18, w=118 -->
  <rect x="18" y="65" width="118" height="80" rx="10" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="77" y="90" text-anchor="middle" fill="white" font-size="18">&#x1F3E5;</text>
  <text x="77" y="108" text-anchor="middle" fill="white" font-size="11" font-weight="600">EHR / Sandbox</text>
  <text x="77" y="121" text-anchor="middle" fill="#93c5fd" font-size="7.5">sandbox.cds-hooks.org</text>
  <text x="77" y="133" text-anchor="middle" fill="#64748b" font-size="7">"patient-view" or "order-sign"</text>

  <!-- Arrow 1→2 -->
  <line x1="136" y1="105" x2="154" y2="105" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <text x="145" y="101" text-anchor="middle" fill="#64748b" font-size="8">hook</text>

  <!-- Step 2: FastAPI — x=156, w=118 -->
  <rect x="156" y="65" width="118" height="80" rx="10" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="215" y="90" text-anchor="middle" fill="white" font-size="18">&#x26A1;</text>
  <text x="215" y="108" text-anchor="middle" fill="white" font-size="11" font-weight="600">FastAPI</text>
  <text x="215" y="121" text-anchor="middle" fill="#93c5fd" font-size="7.5">POST /cds-services/{id}</text>

  <!-- Arrow 2→3 -->
  <line x1="274" y1="105" x2="292" y2="105" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <text x="283" y="101" text-anchor="middle" fill="#64748b" font-size="8">route</text>

  <!-- Step 3: LangGraph Agent — x=294, w=178 -->
  <rect x="294" y="55" width="178" height="100" rx="10" fill="#1e1b4b" stroke="#818cf8" stroke-width="2"/>
  <text x="383" y="74" text-anchor="middle" fill="#a5b4fc" font-size="11" font-weight="700">LangGraph Agent</text>
  <!-- Mini node pills -->
  <rect x="307" y="79" width="152" height="14" rx="4" fill="#312e81" opacity="0.7"/>
  <text x="383" y="90" text-anchor="middle" fill="#c7d2fe" font-size="7.5">context_parser</text>
  <rect x="307" y="95" width="152" height="14" rx="4" fill="#312e81" opacity="0.7"/>
  <text x="383" y="106" text-anchor="middle" fill="#c7d2fe" font-size="7.5">fhir_fetcher</text>
  <rect x="307" y="111" width="152" height="14" rx="4" fill="#312e81" opacity="0.7"/>
  <text x="383" y="122" text-anchor="middle" fill="#c7d2fe" font-size="7.5">checker / scorer</text>
  <rect x="307" y="127" width="74" height="14" rx="4" fill="#312e81" opacity="0.7"/>
  <text x="344" y="138" text-anchor="middle" fill="#c7d2fe" font-size="7.5">llm_reasoner</text>
  <rect x="383" y="127" width="76" height="14" rx="4" fill="#312e81" opacity="0.7"/>
  <text x="421" y="138" text-anchor="middle" fill="#c7d2fe" font-size="7.5">card_builder</text>

  <!-- Arrow 3→4 -->
  <line x1="472" y1="105" x2="490" y2="105" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <text x="481" y="101" text-anchor="middle" fill="#64748b" font-size="8">fetch</text>

  <!-- Step 4: FHIR R4 — x=492, w=118 -->
  <rect x="492" y="65" width="118" height="80" rx="10" fill="#064e3b" stroke="#34d399" stroke-width="1.5"/>
  <text x="551" y="90" text-anchor="middle" fill="white" font-size="18">&#x1F5C4;&#xFE0F;</text>
  <text x="551" y="108" text-anchor="middle" fill="white" font-size="11" font-weight="600">FHIR R4</text>
  <text x="551" y="121" text-anchor="middle" fill="#6ee7b7" font-size="7.5">localhost:8082/fhir</text>

  <!-- Arrow 4→5 -->
  <line x1="610" y1="105" x2="628" y2="105" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <text x="619" y="101" text-anchor="middle" fill="#64748b" font-size="8">data</text>

  <!-- Step 5: GPT-4o — x=630, w=118 -->
  <rect x="630" y="65" width="118" height="80" rx="10" fill="#451a03" stroke="#fb923c" stroke-width="1.5"/>
  <text x="689" y="90" text-anchor="middle" fill="white" font-size="18">&#x1F9E0;</text>
  <text x="689" y="108" text-anchor="middle" fill="white" font-size="11" font-weight="600">GPT-4o</text>
  <text x="689" y="121" text-anchor="middle" fill="#fed7aa" font-size="7.5">langchain-openai</text>
  <text x="689" y="133" text-anchor="middle" fill="#f97316" font-size="7">PHI-free input only</text>

  <!-- Arrow 5→6 -->
  <line x1="748" y1="105" x2="766" y2="105" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <text x="757" y="101" text-anchor="middle" fill="#64748b" font-size="8">cards</text>

  <!-- Step 6: CDS Card — x=768, w=118 -->
  <rect x="768" y="65" width="118" height="80" rx="10" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="827" y="90" text-anchor="middle" fill="white" font-size="18">&#x1F4CB;</text>
  <text x="827" y="108" text-anchor="middle" fill="white" font-size="11" font-weight="600">CDS Card</text>
  <text x="827" y="121" text-anchor="middle" fill="#93c5fd" font-size="7.5">Rendered by EHR</text>
  <!-- Red badge -->
  <rect x="790" y="128" width="75" height="13" rx="4" fill="#7f1d1d" stroke="#ef4444" stroke-width="0.8"/>
  <text x="827" y="138" text-anchor="middle" fill="#fca5a5" font-size="7.5">&#x1F534; HIGH RISK</text>

  <!-- Dashed return arrow from step 6 back to step 1 (arc above) -->
  <path d="M 827 65 C 827 30, 77 30, 77 65"
        fill="none" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="5,3"
        marker-end="url(#arrow-blue-dash)"/>
  <text x="452" y="26" text-anchor="middle" fill="#64748b" font-size="8">card returned to EHR</text>

  <!-- Amber dashed arrow 6→7 -->
  <line x1="886" y1="105" x2="910" y2="105" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrow-amber)"/>
  <text x="898" y="99" text-anchor="middle" fill="#f59e0b" font-size="7.5">clinician clicks</text>

  <!-- Step 7: React SMART App — x=912, w=172 -->
  <rect x="912" y="55" width="172" height="100" rx="10" fill="#0c1a2e" stroke="#60a5fa" stroke-width="2"/>
  <text x="998" y="74" text-anchor="middle" fill="white" font-size="18">&#x269B;&#xFE0F;</text>
  <text x="998" y="92" text-anchor="middle" fill="white" font-size="11" font-weight="600">React SMART App</text>
  <text x="998" y="106" text-anchor="middle" fill="#93c5fd" font-size="7.5">Azure Static Web Apps</text>
  <text x="998" y="118" text-anchor="middle" fill="#64748b" font-size="7">Clinician clicks link</text>
  <rect x="928" y="124" width="140" height="24" rx="4" fill="#0f172a" opacity="0.8"/>
  <text x="998" y="136" text-anchor="middle" fill="#60a5fa" font-size="7.5">qSOFA · Checklist · Actions</text>

  <!-- ==================== ROW 3: TOOLS BAR ==================== -->
  <rect x="14" y="185" width="1072" height="420" rx="8" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>

  <text x="550" y="205" text-anchor="middle" fill="#94a3b8" font-size="10" font-weight="700" letter-spacing="1.5">TOOLS &amp; LIBRARIES</text>

  <!-- Row 3a: 6 tool pills, y=215 -->
  <!-- Pill width ~160px, spacing ~10px. Total 6*160+5*10=1010, offset=(1072-1010)/2+14=45 -->

  <!-- LangGraph pill x=45 -->
  <rect x="45" y="215" width="160" height="52" rx="8" fill="#1e1b4b" stroke="#818cf8" stroke-width="1"/>
  <text x="125" y="233" text-anchor="middle" fill="#a5b4fc" font-size="9.5" font-weight="700">LangGraph</text>
  <text x="125" y="248" text-anchor="middle" fill="#a5b4fc" font-size="7.5">StateGraph · agent orchestration</text>

  <!-- LangChain pill x=215 -->
  <rect x="215" y="215" width="160" height="52" rx="8" fill="#052e16" stroke="#4ade80" stroke-width="1"/>
  <text x="295" y="233" text-anchor="middle" fill="#86efac" font-size="9.5" font-weight="700">LangChain</text>
  <text x="295" y="248" text-anchor="middle" fill="#86efac" font-size="7.5">ChatOpenAI · structured output</text>

  <!-- GPT-4o pill x=385 -->
  <rect x="385" y="215" width="160" height="52" rx="8" fill="#431407" stroke="#fb923c" stroke-width="1"/>
  <text x="465" y="233" text-anchor="middle" fill="#fed7aa" font-size="9.5" font-weight="700">GPT-4o</text>
  <text x="465" y="248" text-anchor="middle" fill="#fed7aa" font-size="7.5">clinical reasoning · NLG</text>

  <!-- FastAPI pill x=555 -->
  <rect x="555" y="215" width="160" height="52" rx="8" fill="#082f49" stroke="#38bdf8" stroke-width="1"/>
  <text x="635" y="233" text-anchor="middle" fill="#7dd3fc" font-size="9.5" font-weight="700">FastAPI</text>
  <text x="635" y="248" text-anchor="middle" fill="#7dd3fc" font-size="7.5">CDS Hooks endpoints</text>

  <!-- FHIR R4 pill x=725 -->
  <rect x="725" y="215" width="160" height="52" rx="8" fill="#052e16" stroke="#34d399" stroke-width="1"/>
  <text x="805" y="233" text-anchor="middle" fill="#6ee7b7" font-size="9.5" font-weight="700">FHIR R4</text>
  <text x="805" y="248" text-anchor="middle" fill="#6ee7b7" font-size="7.5">Observation · MedicationRequest</text>

  <!-- React + Vite pill x=895 -->
  <rect x="895" y="215" width="160" height="52" rx="8" fill="#0c1a2e" stroke="#60a5fa" stroke-width="1"/>
  <text x="975" y="233" text-anchor="middle" fill="#93c5fd" font-size="9.5" font-weight="700">React + Vite</text>
  <text x="975" y="248" text-anchor="middle" fill="#93c5fd" font-size="7.5">SMART app · Azure Static</text>

  <!-- Row 3b: 5 pills + PHI shield, y=285 -->
  <!-- First 4 pills ~160px each then PHI wide pill -->

  <!-- Pydantic v2 pill x=45 -->
  <rect x="45" y="285" width="155" height="52" rx="8" fill="#1a1a2e" stroke="#e879f9" stroke-width="1"/>
  <text x="122" y="303" text-anchor="middle" fill="#f0abfc" font-size="9.5" font-weight="700">Pydantic v2</text>
  <text x="122" y="318" text-anchor="middle" fill="#f0abfc" font-size="7.5">schema validation</text>

  <!-- CDS Hooks v2.0.1 pill x=210 -->
  <rect x="210" y="285" width="160" height="52" rx="8" fill="#1c1917" stroke="#a8a29e" stroke-width="1"/>
  <text x="290" y="303" text-anchor="middle" fill="#d6d3d1" font-size="9.5" font-weight="700">CDS Hooks v2.0.1</text>
  <text x="290" y="318" text-anchor="middle" fill="#d6d3d1" font-size="7.5">HL7 standard</text>

  <!-- LangSmith pill x=380 -->
  <rect x="380" y="285" width="160" height="52" rx="8" fill="#1c1917" stroke="#fbbf24" stroke-width="1"/>
  <text x="460" y="303" text-anchor="middle" fill="#fde68a" font-size="9.5" font-weight="700">LangSmith</text>
  <text x="460" y="318" text-anchor="middle" fill="#fde68a" font-size="7.5">tracing · observability</text>

  <!-- httpx pill x=550 -->
  <rect x="550" y="285" width="155" height="52" rx="8" fill="#082f49" stroke="#38bdf8" stroke-width="1"/>
  <text x="627" y="303" text-anchor="middle" fill="#7dd3fc" font-size="9.5" font-weight="700">httpx</text>
  <text x="627" y="318" text-anchor="middle" fill="#7dd3fc" font-size="7.5">async FHIR client</text>

  <!-- PHI Protection wide pill x=715, width=370 -->
  <rect x="715" y="285" width="370" height="52" rx="8" fill="#1c2510" stroke="#84cc16" stroke-width="1.5"/>
  <text x="900" y="303" text-anchor="middle" fill="#bef264" font-size="9.5" font-weight="700">&#x1F6E1;&#xFE0F; PHI PROTECTION</text>
  <text x="900" y="320" text-anchor="middle" fill="#64748b" font-size="7.5">name · DOB · MRN never reach GPT-4o · Only LOINC · RxCUI · numeric values</text>

  <!-- ==================== BOTTOM LEGEND / RULE SECTION ==================== -->
  <rect x="14" y="355" width="1072" height="245" rx="8" fill="#0a0f1e" stroke="#1e293b" stroke-width="1"/>

  <text x="550" y="375" text-anchor="middle" fill="#94a3b8" font-size="10" font-weight="700" letter-spacing="1.5">NON-NEGOTIABLE RULES</text>

  <!-- Rule 1 -->
  <rect x="30" y="385" width="512" height="40" rx="6" fill="#0f2210" stroke="#22c55e" stroke-width="0.8"/>
  <text x="44" y="401" fill="#4ade80" font-size="8.5" font-weight="700">RULE 1 — PHI SAFETY</text>
  <text x="44" y="417" fill="#86efac" font-size="7.5">Strip patient name, DOB, MRN in context_parser before any LLM call. Agent works on coded clinical values only.</text>

  <!-- Rule 2 -->
  <rect x="558" y="385" width="512" height="40" rx="6" fill="#1a1207" stroke="#f59e0b" stroke-width="0.8"/>
  <text x="572" y="401" fill="#fbbf24" font-size="8.5" font-weight="700">RULE 2 — ALWAYS RETURN VALID CARDS</text>
  <text x="572" y="417" fill="#fde68a" font-size="7.5">Never let the CDS endpoint return a 500. Catch all exceptions in fallback node and return {"cards": []}.</text>

  <!-- Rule 3 -->
  <rect x="30" y="432" width="512" height="40" rx="6" fill="#0d1520" stroke="#3b82f6" stroke-width="0.8"/>
  <text x="44" y="448" fill="#60a5fa" font-size="8.5" font-weight="700">RULE 3 — 500ms BUDGET</text>
  <text x="44" y="464" fill="#93c5fd" font-size="7.5">FHIR fetches use prefetch where available. Skip LLM if no clinical signal (qSOFA = 0). Agent timeout = 3000ms.</text>

  <!-- Rule 4 -->
  <rect x="558" y="432" width="512" height="40" rx="6" fill="#1a0d20" stroke="#e879f9" stroke-width="0.8"/>
  <text x="572" y="448" fill="#e879f9" font-size="8.5" font-weight="700">RULE 4 — PYDANTIC VALIDATION</text>
  <text x="572" y="464" fill="#f0abfc" font-size="7.5">Card output from LangGraph is always validated against the CDS card schema before returning to FastAPI.</text>

  <!-- Rule 5 -->
  <rect x="30" y="479" width="512" height="40" rx="6" fill="#1a1207" stroke="#fbbf24" stroke-width="0.8"/>
  <text x="44" y="495" fill="#fbbf24" font-size="8.5" font-weight="700">RULE 5 — LANGSMITH TRACING ON</text>
  <text x="44" y="511" fill="#fde68a" font-size="7.5">LANGCHAIN_TRACING_V2=true in all environments. All LLM and tool calls are traced in LangSmith.</text>

  <!-- Rule 6 -->
  <rect x="558" y="479" width="512" height="40" rx="6" fill="#0f1218" stroke="#a8a29e" stroke-width="0.8"/>
  <text x="572" y="495" fill="#d6d3d1" font-size="8.5" font-weight="700">RULE 6 — SANDBOX MODE</text>
  <text x="572" y="511" fill="#d6d3d1" font-size="7.5">SANDBOX_MODE=true disables JWT validation and uses open FHIR endpoint. Never commit real API keys.</text>

  <!-- Footer deployment info -->
  <rect x="30" y="528" width="1040" height="55" rx="6" fill="#0c1220" stroke="#1e3a5f" stroke-width="1"/>
  <text x="550" y="546" text-anchor="middle" fill="#94a3b8" font-size="9" font-weight="700" letter-spacing="1">DEPLOYMENT</text>
  <text x="550" y="562" text-anchor="middle" fill="#64748b" font-size="8">Backend: https://clinagent-api.onrender.com</text>
  <text x="550" y="575" text-anchor="middle" fill="#64748b" font-size="8">Frontend: https://lemon-bush-011912610.1.azurestaticapps.net · FHIR: r4.smarthealthit.org · Sandbox: sandbox.cds-hooks.org</text>

</svg>
